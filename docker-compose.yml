version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "${SQL_SA_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SQL_SA_PASSWORD}" -Q "SELECT 1" -No || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=DocPipeline;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: docpipeline
      Jwt__Audience: docpipeline
      Jwt__ExpiresMinutes: "60"
      AzureOpenAI__Endpoint: "${AZURE_OPENAI_ENDPOINT}"
      AzureOpenAI__ApiKey: "${AZURE_OPENAI_API_KEY}"
      AzureOpenAI__DeploymentName: "${AZURE_OPENAI_DEPLOYMENT:-gpt-4o}"
      UseMockAI: "${USE_MOCK_AI:-false}"
      Cors__AllowedOrigins__0: "http://localhost:3000"
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - uploads:/tmp/docpipeline-uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  sqldata:
  uploads:
